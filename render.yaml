services:
  # --- Web Service ---
  - type: web
    name: envoy
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: envoy-db
          property: connectionString
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: GOOGLE_AI_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      # Stripe (cloud mode only)
      - key: ENVOY_CLOUD
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false

  # --- Crawl Worker (background) ---
  - type: worker
    name: envoy-worker
    runtime: docker
    plan: starter
    dockerCommand: node worker.mjs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: envoy-db
          property: connectionString
      - key: OPENAI_API_KEY
        fromService:
          name: envoy
          type: web
          envVarKey: OPENAI_API_KEY
      - key: ENVOY_CLOUD
        fromService:
          name: envoy
          type: web
          envVarKey: ENVOY_CLOUD
      - key: STRIPE_SECRET_KEY
        fromService:
          name: envoy
          type: web
          envVarKey: STRIPE_SECRET_KEY

  # --- Email Polling Cron (every 2 minutes) ---
  - type: cron
    name: envoy-email-poll
    runtime: docker
    schedule: "*/2 * * * *"
    dockerCommand: node -e "fetch(process.env.NEXT_PUBLIC_APP_URL+'/api/email/poll',{headers:{Authorization:'Bearer '+process.env.CRON_SECRET}}).then(r=>{console.log(r.status);process.exit(r.ok?0:1)}).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - key: CRON_SECRET
        fromService:
          name: envoy
          type: web
          envVarKey: CRON_SECRET
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: envoy
          type: web
          envVarKey: NEXT_PUBLIC_APP_URL

  # --- Knowledge Base Recrawl Cron (every 6 hours) ---
  - type: cron
    name: envoy-recrawl
    runtime: docker
    schedule: "0 */6 * * *"
    dockerCommand: node -e "fetch(process.env.NEXT_PUBLIC_APP_URL+'/api/knowledge-base/recrawl',{headers:{Authorization:'Bearer '+process.env.CRON_SECRET}}).then(r=>{console.log(r.status);process.exit(r.ok?0:1)}).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - key: CRON_SECRET
        fromService:
          name: envoy
          type: web
          envVarKey: CRON_SECRET
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          name: envoy
          type: web
          envVarKey: NEXT_PUBLIC_APP_URL

databases:
  - name: envoy-db
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []
