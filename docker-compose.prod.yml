services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://envoy:envoy@db:5432/envoy
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: envoy
      POSTGRES_USER: envoy
      POSTGRES_PASSWORD: envoy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envoy"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env.local
    environment:
      DATABASE_URL: postgresql://envoy:envoy@db:5432/envoy
    command: npx drizzle-kit migrate
    restart: "no"

volumes:
  pgdata:
